pre-commit:
  jobs:
    - name: biome check
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      exclude: "**/generated/**"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files} && git add {staged_files}

    - name: sort package.json
      glob: "**/package.json"
      run: pnpm sort-package-json {staged_files} && git add {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  jobs:
    - name: lint
      run: pnpm biome check .

    - name: typecheck
      run: pnpm tsc --build

    - name: knip
      run: pnpm knip
