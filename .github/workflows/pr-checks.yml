name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/quality-checks

  preview-deploy:
    name: Preview Deploy
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pull-requests: write
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_CLIENT_ID: ${{ vars.INFISICAL_CLIENT_ID }}
      APP_ENV: preview
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Load environment variables
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: apps/api

      - name: Build API (Vite bundles with varlock env injected)
        working-directory: apps/api
        run: pnpm run build

      - name: Create per-PR D1 database
        run: |
          DB_NAME="downtown65-pr-${PR_NUM}"
          # Create DB (idempotent -- || true handles "already exists" error)
          CREATE_OUTPUT=$(npx wrangler d1 create "$DB_NAME" 2>&1 || true)
          # Extract DB ID: first try from create output, then fall back to d1 info
          DB_ID=$(echo "$CREATE_OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            DB_ID=$(npx wrangler d1 info "$DB_NAME" --json | jq -r '.uuid')
          fi
          echo "D1_DB_ID=$DB_ID" >> $GITHUB_ENV
          echo "Created/found D1 database: $DB_NAME ($DB_ID)"

      - name: Patch Vite build config for PR deploy
        working-directory: apps/api/dist/downtown65_api
        run: |
          # Patch the Vite-generated wrangler.json with PR-specific settings
          # Use absolute migrations_dir since config lives in dist/, not apps/api/
          jq --arg name "downtown65-api-pr-${PR_NUM}" \
             --arg db_name "dt65-pr-${PR_NUM}" \
             --arg db_id "$D1_DB_ID" \
             --arg account_id "$CLOUDFLARE_ACCOUNT_ID" \
             --arg migrations_dir "${{ github.workspace }}/apps/api/drizzle" \
             '.name = $name | .account_id = $account_id | .workers_dev = true | .d1_databases[0].database_name = $db_name | .d1_databases[0].database_id = $db_id | .d1_databases[0].migrations_dir = $migrations_dir' \
             wrangler.json > wrangler.pr.json

      - name: Apply D1 migrations
        working-directory: apps/api
        run: npx wrangler d1 migrations apply dt65-pr-${PR_NUM} --remote --config dist/downtown65_api/wrangler.pr.json

      - name: Sync Auth0 users to D1
        working-directory: apps/api
        run: |
          npx varlock run -- tsx scripts/sync-auth0-users.ts
          npx wrangler d1 execute dt65-pr-${PR_NUM} --remote --file data/seed-users.sql --config dist/downtown65_api/wrangler.pr.json

      - name: Deploy API preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/api/dist/downtown65_api
          command: deploy --config wrangler.pr.json
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Events preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/events
          command: deploy --name downtown65-events-pr-${{ env.PR_NUM }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy WWW preview
        uses: cloudflare/wrangler-action@v3
        env:
          SITE_URL: https://downtown65-www-pr-${{ env.PR_NUM }}.dt65.workers.dev
        with:
          workingDirectory: apps/www
          preCommands: pnpm run build
          command: deploy --name downtown65-www-pr-${{ env.PR_NUM }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const marker = '<!-- dt65-preview-urls -->';
            const body = [
              marker,
              '### Preview Deployments',
              '',
              `- **API:** downtown65-api-pr-${prNum}.dt65.workers.dev`,
              `- **Events:** downtown65-events-pr-${prNum}.dt65.workers.dev`,
              `- **WWW:** downtown65-www-pr-${prNum}.dt65.workers.dev`,
              '',
              `_Updated: ${new Date().toISOString()}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
