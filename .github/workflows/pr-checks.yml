name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/quality-checks

  preview-deploy:
    name: Preview Deploy
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pull-requests: write
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_CLIENT_ID: ${{ vars.INFISICAL_CLIENT_ID }}
      APP_ENV: preview
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Load environment variables
        run: pnpm --filter @dt65/api exec varlock load

      - name: Create per-PR D1 database
        run: |
          DB_NAME="downtown65-pr-${PR_NUM}"
          # Create DB (idempotent -- || true handles "already exists" error)
          CREATE_OUTPUT=$(npx wrangler d1 create "$DB_NAME" 2>&1 || true)
          # Extract DB ID: first try from create output, then fall back to d1 info
          DB_ID=$(echo "$CREATE_OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            DB_ID=$(npx wrangler d1 info "$DB_NAME" --json | jq -r '.uuid')
          fi
          echo "D1_DB_ID=$DB_ID" >> $GITHUB_ENV
          echo "Created/found D1 database: $DB_NAME ($DB_ID)"

      - name: Generate PR wrangler config
        run: |
          cat > apps/api/wrangler.pr.jsonc <<EOF
          {
            "\$schema": "./node_modules/wrangler/config-schema.json",
            "account_id": "${CLOUDFLARE_ACCOUNT_ID}",
            "name": "downtown65-api-pr-${PR_NUM}",
            "main": "src/index.ts",
            "compatibility_date": "2026-02-01",
            "compatibility_flags": ["nodejs_compat_v2"],
            "observability": { "enabled": true },
            "workers_dev": true,
            "d1_databases": [
              {
                "binding": "DB",
                "database_name": "dt65-pr-${PR_NUM}",
                "database_id": "${D1_DB_ID}"
              }
            ]
          }
          EOF

      - name: Deploy API preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/api
          preCommands: pnpm run build
          command: deploy --config wrangler.pr.jsonc
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Events preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/events
          command: deploy --name downtown65-events-pr-${{ env.PR_NUM }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy WWW preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/www
          preCommands: pnpm run build
          command: deploy --name downtown65-www-pr-${{ env.PR_NUM }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const marker = '<!-- dt65-preview-urls -->';
            const body = [
              marker,
              '### Preview Deployments',
              '',
              `- **API:** downtown65-api-pr-${prNum}.dt65.workers.dev`,
              `- **Events:** downtown65-events-pr-${prNum}.dt65.workers.dev`,
              `- **WWW:** downtown65-www-pr-${prNum}.dt65.workers.dev`,
              '',
              `_Updated: ${new Date().toISOString()}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
