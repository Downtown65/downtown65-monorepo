name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  checks:
    name: Quality Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/quality-checks

  deploy:
    name: Deploy All Apps
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_CLIENT_ID: ${{ vars.INFISICAL_CLIENT_ID }}
      APP_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Load environment variables
        run: pnpm --filter @dt65/api exec varlock load

      - name: Deploy API
        id: deploy-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          preCommands: pnpm run build
          environment: production

      - name: Deploy Events
        id: deploy-events
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/events
          command: deploy

      - name: Deploy WWW
        id: deploy-www
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/www
          command: deploy

      - name: Summary
        run: |
          echo "**API:** ${{ steps.deploy-api.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Events:** ${{ steps.deploy-events.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**WWW:** ${{ steps.deploy-www.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
